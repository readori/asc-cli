<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        {{extraReset}}
        body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111}
        .preview{width:320px;aspect-ratio:{{aspectRatio}};container-type:inline-size}
        {{#if fillViewport}}
        html,body{width:100%;height:100%}
        body{margin:0;overflow:hidden;display:block;min-height:auto;background:none}
        .preview{width:100%;height:100%}
        {{/if}}
    </style>
</head>
<body>
<div class="preview">{{inner}}</div>
</body>
</html>
