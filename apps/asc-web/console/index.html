<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASC Web Console</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../shared/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../shared/static/favicon-16x16.png">
  <link rel="apple-touch-icon" href="../shared/static/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../shared/static/logo.png" alt="ASC" style="width:32px;height:32px;border-radius:var(--radius)">
      <div>
        <div class="title">ASC Console</div>
        <div class="version">v0.1.53</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="nav">
      <!-- Populated by JS -->
    </nav>

    <div class="sidebar-footer">
      <div class="auth-status">
        <div class="auth-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <div class="auth-name">Connected</div>
          <div class="auth-detail">~/.asc/credentials</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div style="display:flex;align-items:center;gap:12px">
          <h1 class="header-title" id="page-title"></h1>
          <span class="header-badge" id="page-badge" style="display:none"></span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="search-input" placeholder="Search...  /" />
          </div>
          <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle theme">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button class="icon-btn" id="terminal-btn" title="Run command">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <div class="content fade-in" id="page-content">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Terminal Panel -->
  <div class="terminal-panel" id="terminal-panel">
    <div class="terminal-inner">
      <div class="terminal-header">
        <div style="display:flex;align-items:center;gap:8px">
          <svg style="width:14px;height:14px;color:var(--terminal-text-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span style="font-size:12px;font-weight:500;color:var(--text-secondary)">Terminal</span>
          <span class="status-badge status-ready" id="terminal-status">ready</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <button class="icon-btn" id="terminal-clear" title="Clear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
          <button class="icon-btn" id="terminal-close" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="terminal-output" id="cmd-output">
        <div style="color:var(--terminal-text-muted)">ASC Web Console terminal. Type a command and press Enter.</div>
        <div style="color:var(--terminal-text-muted);font-size:10px">Server: <span id="server-url">detecting...</span></div>
      </div>
      <div class="terminal-input-bar">
        <span style="color:var(--terminal-prompt);font-size:12px;font-family:var(--font-mono)">$</span>
        <input type="text" id="cmd-input" placeholder="asc apps list --output json --pretty" autocomplete="off" spellcheck="false" />
      </div>
    </div>
  </div>

  <!-- Search Overlay -->
  <div class="cmd-palette-overlay" id="cmd-modal">
    <div class="cmd-palette-backdrop" id="cmd-backdrop"></div>
    <div class="cmd-palette">
      <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)">
        <svg style="width:16px;height:16px;color:var(--text-muted);flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="palette-input" placeholder="Search features and commands..." style="flex:1;background:transparent;border:none;font-size:14px;color:var(--text-primary);outline:none" autocomplete="off" spellcheck="false" />
        <kbd style="font-size:10px;color:var(--text-secondary);background:var(--kbd-bg);padding:2px 6px;border-radius:4px;border:1px solid var(--kbd-border)">ESC</kbd>
      </div>
      <div id="palette-results" style="max-height:320px;overflow-y:auto">
        <!-- Populated by JS -->
      </div>
      <div style="display:flex;align-items:center;gap:16px;padding:8px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--text-muted)">
        <span style="display:flex;align-items:center;gap:4px"><kbd style="background:var(--kbd-bg);color:var(--text-secondary);padding:1px 5px;border-radius:3px;font-size:9px;border:1px solid var(--kbd-border)">↑↓</kbd> navigate</span>
        <span style="display:flex;align-items:center;gap:4px"><kbd style="background:var(--kbd-bg);color:var(--text-secondary);padding:1px 5px;border-radius:3px;font-size:9px;border:1px solid var(--kbd-border)">↵</kbd> select</span>
        <span style="display:flex;align-items:center;gap:4px"><kbd style="background:var(--kbd-bg);color:var(--text-secondary);padding:1px 5px;border-radius:3px;font-size:9px;border:1px solid var(--kbd-border)">esc</kbd> close</span>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
